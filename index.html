<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roguelite Survivor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a2e;
            overflow: hidden;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            background: #16213e;
            border: 3px solid #0f3460;
            box-shadow: 0 0 20px rgba(15, 52, 96, 0.5);
        }

        /* Scrollbar Styles */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(15, 52, 96, 0.2);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb {
            background: #e94560;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #ff6b6b;
        }

        /* UI Styles */
        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .hud {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #e94560;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            pointer-events: none;
        }

        .xp-bar-container {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 25px;
            background: rgba(0,0,0,0.7);
            border: 2px solid #0f3460;
            border-radius: 12px;
            overflow: hidden;
        }

        .xp-bar {
            height: 100%;
            background: linear-gradient(90deg, #0f3460, #e94560);
            width: 0%;
            transition: width 0.3s;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .xp-text {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
            font-size: 12px;
            text-shadow: 1px 1px 2px black;
            z-index: 2;
        }

        .hp-bar-container {
            position: absolute;
            top: 45px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 20px;
            background: rgba(0,0,0,0.7);
            border: 2px solid #0f3460;
            border-radius: 10px;
            overflow: hidden;
        }

        .hp-bar {
            height: 100%;
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            width: 100%;
            transition: width 0.2s;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .hp-text {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
            font-size: 12px;
            text-shadow: 1px 1px 2px black;
            z-index: 2;
        }

        .buff-icons {
            position: absolute;
            top: 45px;
            left: 50%;
            transform: translateX(110px);
            display: flex;
            gap: 8px;
        }

        .buff-icon {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #0f3460;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 16px;
            position: relative;
            overflow: hidden;
        }

        .buff-timer {
            position: absolute;
            top: 0;
            left: 0;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            z-index: 1;
            pointer-events: none;
        }

        .buff-icon span {
            z-index: 2;
        }

        .upgrades-list {
            position: absolute;
            top: 130px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #0f3460;
            border-radius: 10px;
            padding: 8px;
            width: 120px;
            box-sizing: border-box;
        }

        .upgrades-title {
            color: #e94560;
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 5px;
            padding-bottom: 3px;
            border-bottom: 1px solid #0f3460;
        }

        .upgrades-items {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .upgrade-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 3px 5px;
            background: rgba(26, 26, 46, 0.8);
            border-radius: 4px;
        }

        .upgrade-item-icon {
            font-size: 16px;
            flex-shrink: 0;
        }

        .upgrade-item-level {
            color: #ff9f43;
            font-weight: bold;
            font-size: 10px;
        }

        /* Key Info Display */
        .key-info {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #0f3460;
            border-radius: 10px;
            padding: 15px;
            color: #e94560;
            font-size: 14px;
            pointer-events: none;
        }

        .key-info-title {
            font-weight: bold;
            margin-bottom: 10px;
            color: #0f3460;
        }

        .key-info-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 5px 0;
        }

        .key {
            background: #16213e;
            border: 2px solid #0f3460;
            border-radius: 5px;
            padding: 5px 10px;
            font-weight: bold;
            min-width: 30px;
            text-align: center;
        }

        /* Virtual Joystick Styles */
        .virtual-joystick {
            position: absolute;
            bottom: 80px;
            left: 50px;
            z-index: 50;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        .joystick-base {
            width: 140px;
            height: 140px;
            background: rgba(0, 0, 0, 0.6);
            border: 3px solid #0f3460;
            border-radius: 50%;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: none;
        }

        .joystick-stick {
            width: 60px;
            height: 60px;
            background: rgba(233, 69, 96, 0.9);
            border-radius: 50%;
            position: absolute;
            border: 3px solid #e94560;
            transition: transform 0.05s ease-out;
            touch-action: none;
        }

        .virtual-joystick.hidden {
            display: none;
        }

        /* Skill Buttons */
        .skill-buttons {
            position: absolute;
            bottom: 80px;
            right: 50px;
            display: flex;
            gap: 20px;
            z-index: 50;
            pointer-events: auto;
        }

        .skill-btn {
            width: 85px;
            height: 85px;
            background: rgba(128, 128, 128, 0.6);
            border: 3px solid #666;
            border-radius: 50%;
            font-size: 38px;
            cursor: not-allowed;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s;
            position: relative;
            pointer-events: auto;
            touch-action: manipulation;
        }

        .skill-btn.ready {
            background: rgba(233, 69, 96, 0.8);
            border-color: #e94560;
            cursor: pointer;
        }

        .skill-btn.ready:active {
            transform: scale(0.9);
        }

        .skill-btn .cooldown-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-90deg);
            width: 79px;
            height: 79px;
            border-radius: 50%;
            background: conic-gradient(rgba(0, 0, 0, 0.7) 0deg, transparent 0deg);
            pointer-events: none;
            box-sizing: border-box;
        }

        .skill-btn > div:not(.cooldown-overlay):not(.skill-label) {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 38px;
            z-index: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 79px;
            height: 79px;
            pointer-events: none;
        }

        .skill-btn .skill-label {
            position: absolute;
            bottom: -25px;
            font-size: 14px;
            color: #fff;
            text-shadow: 1px 1px 2px #000;
            white-space: nowrap;
            pointer-events: none;
        }

        /* Skill Select Button */
        .skill-select-btn {
            margin-top: 10px;
            padding: 8px 16px;
            background: linear-gradient(135deg, #f39c12, #e67e22);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .skill-select-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(243, 156, 18, 0.5);
        }

        /* Skill Selection Styles */
        .skill-section {
            margin-bottom: 30px;
            width: 100%;
            max-width: 800px;
        }

        .skill-section h3 {
            color: #e94560;
            font-size: 24px;
            margin-bottom: 15px;
            text-align: center;
        }

        .skill-options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .skill-option {
            background: #16213e;
            border: 3px solid #0f3460;
            border-radius: 10px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .skill-option:hover {
            border-color: #e94560;
            transform: scale(1.05);
        }

        .skill-option.selected {
            border-color: #f39c12;
            box-shadow: 0 0 15px rgba(243, 156, 18, 0.5);
        }

        .skill-option.locked {
            opacity: 0.5;
            cursor: not-allowed;
            border-color: #333;
        }

        .skill-option.locked:hover {
            transform: none;
        }

        .skill-option-emoji {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .skill-option-name {
            color: #e94560;
            font-size: 20px;
            margin-bottom: 8px;
        }

        .skill-option-desc {
            color: #6a7b8a;
            font-size: 14px;
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .skill-option-cooldown {
            color: #f39c12;
            font-size: 13px;
            font-weight: bold;
        }

        .skill-option-lock {
            color: #ff9f43;
            font-size: 12px;
            margin-top: 5px;
        }

        /* Skill Select Button */
        .skill-select-btn {
            margin-top: 10px;
            padding: 8px 16px;
            background: linear-gradient(135deg, #f39c12, #e67e22);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .skill-select-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(243, 156, 18, 0.5);
        }

        /* Menu Styles */
        .menu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: all;
            z-index: 100;
            padding: 20px;
            box-sizing: border-box;
            overflow: hidden;
        }

        .menu.hidden {
            display: none !important;
        }

        .menu h1 {
            color: #e94560;
            font-size: clamp(24px, 4vw, 48px);
            margin-bottom: 15px;
            text-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
        }

        .menu h2 {
            color: #0f3460;
            font-size: clamp(18px, 2.5vw, 36px);
            margin-bottom: 25px;
        }

        .character-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
            max-width: 800px;
            width: 100%;
        }

        .character-card {
            width: 100%;
            max-width: 200px;
            padding: 15px;
            background: #16213e;
            border: 3px solid #0f3460;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .character-card:hover {
            border-color: #e94560;
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
        }

        .character-card.locked {
            opacity: 0.5;
            cursor: not-allowed;
            border-color: #333;
        }

        .character-card.locked:hover {
            transform: none;
            box-shadow: none;
        }

        .character-name {
            color: #e94560;
            font-size: clamp(16px, 2.5vw, 20px);
            margin-bottom: 8px;
        }

        .character-ability {
            color: #0f3460;
            font-size: clamp(11px, 1.5vw, 13px);
            margin-bottom: 6px;
        }

        .character-stats {
            color: #6a7b8a;
            font-size: clamp(10px, 1.3vw, 11px);
            line-height: 1.5;
        }

        .lock-icon {
            font-size: clamp(30px, 4vw, 40px);
            margin-bottom: 8px;
        }

        .unlock-condition {
            color: #ff9f43;
            font-size: clamp(9px, 1.2vw, 11px);
            margin-top: 6px;
        }

        .btn {
            padding: clamp(8px, 1.5vw, 12px) clamp(15px, 3.5vw, 40px);
            font-size: clamp(12px, 1.5vw, 16px);
            background: linear-gradient(135deg, #e94560, #0f3460);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            margin: 8px;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.7);
        }

        /* Save Slot Styles */
        .save-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            margin-bottom: 30px;
            max-width: 900px;
            width: 100%;
            justify-items: center;
        }

        .save-slot {
            width: 100%;
            max-width: 250px;
            padding: 25px;
            background: #16213e;
            border: 3px solid #0f3460;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .save-slot:hover {
            border-color: #e94560;
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
        }

        .save-slot.empty {
            opacity: 0.7;
            border-style: dashed;
        }

        .save-name {
            color: #e94560;
            font-size: 24px;
            margin-bottom: 15px;
        }

        .save-stats {
            color: #6a7b8a;
            font-size: 14px;
            line-height: 1.8;
        }

        /* Name Input Screen */
        .name-input-container {
            background: #16213e;
            border: 3px solid #0f3460;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
        }

        .name-input-container h2 {
            color: #e94560;
            font-size: 32px;
            margin-bottom: 30px;
        }

        .name-input {
            width: 300px;
            padding: 15px;
            font-size: 20px;
            background: #1a1a2e;
            border: 2px solid #0f3460;
            border-radius: 10px;
            color: #e94560;
            text-align: center;
            margin-bottom: 20px;
        }

        .virtual-keyboard {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 5px;
            margin: 20px 0;
        }

        .keyboard-key {
            padding: 12px;
            background: #16213e;
            border: 2px solid #0f3460;
            border-radius: 5px;
            color: #e94560;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .keyboard-key:hover {
            background: #0f3460;
            border-color: #e94560;
        }

        .keyboard-key.special {
            background: #1a1a2e;
            font-size: 12px;
        }

        /* Achievements Screen */
        .achievements-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            max-height: clamp(300px, 50vh, 500px);
            overflow-y: auto;
            padding: 20px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 15px;
            max-width: 1200px;
            width: 100%;
        }

        .achievement-card {
            padding: 20px;
            background: #16213e;
            border: 2px solid #0f3460;
            border-radius: 10px;
            text-align: center;
            min-width: 200px;
        }

        .achievement-card.unlocked {
            border-color: #e94560;
            background: rgba(233, 69, 96, 0.2);
        }

        .achievement-card.locked {
            opacity: 0.5;
            border-color: #333;
        }

        .achievement-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .achievement-name {
            color: #e94560;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .achievement-desc {
            color: #6a7b8a;
            font-size: 12px;
            line-height: 1.4;
        }

        /* Settings Screen */
        .settings-content {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin: 20px 0;
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 10px;
        }

        .setting-item {
            display: flex;
            align-items: center;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            border: 2px solid #0f3460;
        }

        .setting-label {
            display: flex;
            align-items: center;
            gap: 15px;
            color: #e94560;
            font-size: 18px;
            cursor: pointer;
            user-select: none;
        }

        .setting-label input[type="checkbox"] {
            width: 24px;
            height: 24px;
            cursor: pointer;
            accent-color: #e94560;
        }

        /* Character Selection Stats */
        .character-stats-display {
            display: flex;
            gap: 30px;
            margin-bottom: 15px;
            color: #0f3460;
            font-size: clamp(14px, 1.8vw, 18px);
            flex-wrap: wrap;
            justify-content: center;
        }

        .stats-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Pause Menu */
        .pause-menu {
            background: rgba(22, 33, 62, 0.95);
            border: 3px solid #0f3460;
            border-radius: 20px;
            padding: 50px;
            text-align: center;
        }

        .pause-menu h2 {
            color: #e94560;
            font-size: 48px;
            margin-bottom: 40px;
        }

        .pause-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .pause-btn {
            padding: 20px 60px;
            font-size: 24px;
            background: linear-gradient(135deg, #e94560, #0f3460);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .pause-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.7);
        }

        .pause-btn.danger {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
        }

        /* Upgrade Menu */
        .upgrade-menu {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(22, 33, 62, 0.95);
            border: 3px solid #0f3460;
            border-radius: 20px;
            padding: 40px;
            z-index: 100;
            min-width: 600px;
        }

        .upgrade-menu.hidden {
            display: none !important;
        }

        .upgrade-menu h2 {
            color: #e94560;
            font-size: 36px;
            text-align: center;
            margin-bottom: 30px;
        }

        .upgrade-options {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .upgrade-card {
            padding: 20px;
            background: #1a1a2e;
            border: 2px solid #0f3460;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .upgrade-card:hover {
            border-color: #e94560;
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(233, 69, 96, 0.5);
        }

        .upgrade-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .upgrade-name {
            color: #e94560;
            font-size: 18px;
            margin-bottom: 8px;
        }

        .upgrade-desc {
            color: #6a7b8a;
            font-size: 12px;
            line-height: 1.4;
        }

        .upgrade-level {
            color: #ff9f43;
            font-size: 14px;
            margin-top: 8px;
        }

        /* Game Over Screen */
        .game-over-screen {
            text-align: center;
        }

        .game-over-screen h2 {
            color: #e94560;
            font-size: 60px;
            margin-bottom: 20px;
        }

        .final-stats {
            color: #0f3460;
            font-size: 24px;
            margin-bottom: 30px;
            line-height: 2;
        }

        /* Responsive Design - iPad Pro */
        @media (min-width: 1024px) and (max-width: 1366px) {
            .virtual-joystick {
                bottom: 100px;
                left: 80px;
            }

            .joystick-base {
                width: 150px;
                height: 150px;
                background: rgba(0, 0, 0, 0.3);
                border: 2px solid rgba(15, 52, 96, 0.5);
            }

            .joystick-stick {
                width: 65px;
                height: 65px;
                background: rgba(233, 69, 96, 0.5);
                border: 2px solid rgba(233, 69, 96, 0.4);
            }

            .skill-buttons {
                bottom: 100px;
                right: 80px;
                gap: 25px;
            }

            .skill-btn {
                width: 90px;
                height: 90px;
                font-size: 40px;
            }

            .skill-btn .cooldown-overlay {
                width: 84px;
                height: 84px;
            }

            .skill-btn > div:not(.cooldown-overlay):not(.skill-label) {
                font-size: 40px;
                width: 84px;
                height: 84px;
            }

            .skill-btn .skill-label {
                bottom: -28px;
                font-size: 15px;
            }

            .xp-bar-container {
                width: 500px;
                height: 30px;
            }

            .xp-bar {
                font-size: 14px;
            }

            .hp-bar-container {
                width: 250px;
                height: 25px;
            }

            .hp-bar {
                font-size: 14px;
            }

            .upgrades-list {
                width: 140px;
                padding: 10px;
            }

            .hud {
                font-size: 20px;
            }

            .key-info {
                font-size: 16px;
            }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .character-grid {
                gap: 15px;
                max-width: 600px;
            }

            .character-card {
                padding: 12px;
            }

            .save-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .achievements-grid {
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
                gap: 15px;
            }

            .settings-content {
                padding: 15px;
            }

            .setting-item {
                padding: 10px;
            }

            .setting-label {
                font-size: 16px;
            }

            .skill-section {
                max-width: 100%;
            }

            .skill-options {
                grid-template-columns: 1fr;
                gap: 15px;
            }
        }

        @media (max-width: 480px) {
            .character-grid {
                gap: 10px;
                max-width: 100%;
            }

            .character-card {
                padding: 10px;
            }

            .achievements-grid {
                grid-template-columns: 1fr;
            }

            .skill-options {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 480px) {
            .character-grid {
                gap: 10px;
                max-width: 100%;
            }

            .character-card {
                padding: 10px;
            }

            .achievements-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>

        <!-- HUD -->
        <div class="ui-overlay" id="hud" style="display: none;">
            <div class="hud">
                <div>⏱️ 時間: <span id="timer">00:00</span></div>
                <div>💀 殺敵數: <span id="kill-count">0</span></div>
                <div>⭐ 等級: <span id="level">1</span></div>
            </div>
            <div class="upgrades-list" id="upgrades-list">
                <div class="upgrades-title">已選升級</div>
                <div class="upgrades-items" id="upgrades-items"></div>
            </div>
            <div class="xp-bar-container">
                <div class="xp-bar" id="xp-bar"></div>
                <div class="xp-text">XP: <span id="xp-text">0/100</span></div>
            </div>
            <div style="display: flex; align-items: center; gap: 10px;">
                <div class="hp-bar-container">
                    <div class="hp-bar" id="hp-bar"></div>
                    <div class="hp-text" id="hp-text">100/100</div>
                </div>
                <div class="buff-icons" id="buff-icons"></div>
            </div>
            <div class="key-info">
                <div class="key-info-title">按鍵說明</div>
                <div class="key-info-row">
                    <span class="key">W</span>
                    <span>上</span>
                </div>
                <div class="key-info-row">
                    <span class="key">S</span>
                    <span>下</span>
                </div>
                <div class="key-info-row">
                    <span class="key">A</span>
                    <span>左</span>
                </div>
                <div class="key-info-row">
                    <span class="key">D</span>
                    <span>右</span>
                </div>
                <div class="key-info-row">
                    <span class="key">P</span>
                    <span>暫停</span>
                </div>
            </div>

            <!-- Virtual Joystick -->
            <div class="virtual-joystick hidden" id="virtual-joystick">
                <div class="joystick-base" id="joystick-base">
                    <div class="joystick-stick" id="joystick-stick"></div>
                </div>
            </div>

            <!-- Skill Buttons -->
            <div class="skill-buttons" id="skill-buttons">
                <button class="skill-btn" id="skill1-btn" onclick="useSkill(1)">
                    <div class="cooldown-overlay" id="skill1-cd"></div>
                    <div id="skill1-icon"></div>
                    <div class="skill-label" id="skill1-label"></div>
                </button>
                <button class="skill-btn" id="skill2-btn" onclick="useSkill(2)">
                    <div class="cooldown-overlay" id="skill2-cd"></div>
                    <div id="skill2-icon"></div>
                    <div class="skill-label" id="skill2-label"></div>
                </button>
            </div>
        </div>

        <!-- Main Menu -->
        <div class="menu" id="main-menu">
            <h1>🎮 ROGUELITE SURVIVOR</h1>
            <button class="btn" onclick="showSaveSlots()">START GAME</button>
        </div>

        <!-- Save Slots Screen -->
        <div class="menu hidden" id="save-slots-screen">
            <h1>💾 選擇存檔</h1>
            <div class="save-grid" id="save-grid"></div>
            <button class="btn" onclick="showMainMenu()">返回</button>
        </div>

        <!-- Name Input Screen -->
        <div class="menu hidden" id="name-input-screen">
            <div class="name-input-container">
                <h2>輸入你的名字</h2>
                <input type="text" id="name-input" class="name-input" placeholder="請輸入名字" maxlength="12">
                <div class="virtual-keyboard" id="virtual-keyboard"></div>
                <div style="display: flex; gap: 20px; justify-content: center; margin-top: 20px;">
                    <button class="btn" onclick="confirmName()">確認</button>
                    <button class="btn" onclick="showSaveSlots()">取消</button>
                </div>
            </div>
        </div>

        <!-- Character Selection Screen -->
        <div class="menu hidden" id="character-screen">
            <h1>🎮 ROGUELITE SURVIVOR</h1>
            <div class="character-stats-display">
                <div class="stats-item">💀 總殺敵: <span id="total-kills-display">0</span></div>
                <div class="stats-item">⏱️ 總時長: <span id="total-time-display">00:00</span></div>
            </div>
            <div style="display: flex; gap: 10px; justify-content: center;">
                <button class="btn" onclick="showSettings()">⚙️ 設定</button>
                <button class="btn" onclick="showAchievements()">🏆 遊戲成就</button>
            </div>
            <div class="character-grid" id="character-grid"></div>
            <div style="display: flex; gap: 20px; justify-content: center;">
                <button class="btn" onclick="startGame()">開始遊戲</button>
                <button class="btn" onclick="showSaveSlots()">返回</button>
            </div>
        </div>

        <!-- Achievements Screen -->
        <div class="menu hidden" id="achievements-screen">
            <h2>🏆 遊戲成就</h2>
            <div class="achievements-grid" id="achievements-grid"></div>
            <button class="btn" onclick="hideAchievements()">返回</button>
        </div>

        <!-- Settings Screen -->
        <div class="menu hidden" id="settings-screen">
            <h2>⚙️ 設定</h2>
            <div class="settings-content">
                <div class="setting-item">
                    <label class="setting-label">
                        <input type="checkbox" id="show-damage-numbers" onchange="saveSettings()">
                        顯示傷害數值
                    </label>
                </div>
            </div>
            <button class="btn" onclick="hideSettings()">返回</button>
        </div>

        <!-- Pause Menu -->
        <div class="menu hidden" id="pause-menu">
            <div class="pause-menu">
                <h2>⏸️ 遊戲暫停</h2>
                <div class="pause-buttons">
                    <button class="pause-btn" onclick="resumeGame()">繼續遊戲</button>
                    <button class="pause-btn danger" onclick="returnToCharacterScreen()">返回選單</button>
                </div>
            </div>
        </div>

        <!-- Upgrade Menu -->
        <div class="upgrade-menu hidden" id="upgrade-menu">
            <h2>⬆️ 選擇升級</h2>
            <div style="text-align: center; margin-bottom: 15px;">
                <button id="reroll-button" style="padding: 10px 20px; background: #f39c12; border: none; border-radius: 5px; color: white; cursor: pointer; font-size: 16px; display: none;">
                    🔄 刷新升級選項 (剩餘: <span id="reroll-count">0</span>)
                </button>
            </div>
            <div class="upgrade-options" id="upgrade-options"></div>
        </div>

        <!-- Game Over Screen -->
        <div class="menu hidden game-over-screen" id="game-over-screen">
            <h2>💀 遊戲結束</h2>
            <div class="final-stats" id="final-stats"></div>
            <div style="display: flex; gap: 20px; justify-content: center;">
                <button class="btn" onclick="playAgain()">再玩一次</button>
                <button class="btn" onclick="returnToCharacterScreen()">返回選單</button>
            </div>
        </div>

        <!-- Skill Selection Screen -->
        <div class="menu hidden skill-menu" id="skill-menu">
            <h2>🎯 選擇技能</h2>
            <div class="skill-section">
                <h3>技能一 (LV3 解鎖)</h3>
                <div class="skill-options" id="skill1-options"></div>
            </div>
            <div class="skill-section">
                <h3>技能二 (LV5 解鎖)</h3>
                <div class="skill-options" id="skill2-options"></div>
            </div>
            <div style="display: flex; gap: 20px; justify-content: center; margin-top: 20px;">
                <button class="btn" onclick="confirmSkillSelection()">確定</button>
                <button class="btn" onclick="hideSkillSelection()">取消</button>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
